<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Text message opt-in — H3 Operations</title>
<meta name="description" content="Opt in to receive text messages from H3 Operations LLC." />
<!-- Compliance page: no analytics/tracking pixels by design. -->
<meta name="robots" content="noindex" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  /* Operator Blue tokens — verbatim from h3-design-system.html (see marketing index.html). */
  :root {
    --navy: #0B2A4A;
    --blue: #1554C8;
    --blue-bright: #2E7BFF;
    --coral: #FF6B5E;
    --ink: #11202F;
    --muted: #586674;
    --line: #E4EAF1;
    --tint: #F2F7FE;
    --bg: #FFFFFF;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-body);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 1.5rem;
  }
  .card {
    width: 100%;
    max-width: 30rem;
    border: 1px solid var(--line);
    border-radius: 1rem;
    padding: 2rem;
  }
  h1 {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--navy);
    margin: 0 0 0.5rem;
  }
  .sub { font-size: 0.875rem; color: var(--muted); margin: 0 0 1.5rem; }
  label.field { display: block; font-size: 0.875rem; font-weight: 500; color: var(--ink); margin-bottom: 0.375rem; }
  input[type="tel"] {
    width: 100%;
    border: 1px solid #cdd7e3;
    border-radius: 0.5rem;
    padding: 0.625rem 0.875rem;
    font-family: var(--font-body);
    font-size: 1rem;
    color: var(--ink);
    margin-bottom: 1.25rem;
  }
  input[type="tel"]:focus { outline: 2px solid var(--blue-bright); outline-offset: 1px; }
  .consent {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    font-size: 0.8125rem;
    line-height: 1.5;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }
  .consent input { margin-top: 0.2rem; width: 1rem; height: 1rem; flex-shrink: 0; }
  .consent a { color: var(--blue); }
  button {
    width: 100%;
    background: var(--navy);
    color: #fff;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1rem;
    border: 0;
    border-radius: 0.5rem;
    padding: 0.8rem;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  .msg { font-size: 0.875rem; margin-bottom: 1rem; }
  .msg.error { color: var(--coral); }
  .done { text-align: center; }
  .done p { color: var(--muted); }
  .hidden { display: none; }
</style>
</head>
<body>
  <main class="wrap">
    <!-- Success state -->
    <div id="done" class="card done hidden">
      <h1>You're opted in</h1>
      <p>Thanks — we've recorded your consent. Reply STOP at any time to opt out.</p>
    </div>

    <!-- Form state -->
    <form id="form" class="card">
      <h1>Text message opt-in</h1>
      <p class="sub">H3 Operations LLC — appointment confirmations, service follow-ups, and account updates.</p>

      <label class="field" for="phone">Phone number</label>
      <input id="phone" name="phone" type="tel" required placeholder="(555) 123-4567" autocomplete="tel" />

      <label class="consent">
        <input id="consent" type="checkbox" />
        <span>
          By checking this box, I agree to receive text messages from H3 Operations LLC
          (appointment confirmations, service follow-ups, and account updates) at the phone
          number provided. Message frequency varies. Message and data rates may apply. Reply
          STOP to opt out at any time, or HELP for help, or contact us at
          <a href="mailto:admin@h3operations.com">admin@h3operations.com</a>. Consent is not a
          condition of purchase. View our <a href="/privacy">Privacy Policy</a> and
          <a href="/terms">Terms of Service</a>.
        </span>
      </label>

      <p id="error" class="msg error hidden"></p>

      <button id="submit" type="submit">Opt in</button>
    </form>
  </main>

  <script>
    // Bump this whenever the consent wording above changes. Stored on each record
    // so an old consent stays auditable against the exact language shown.
    var CONSENT_COPY_VERSION = 'v1-2026-07';
    var FUNCTION_URL = 'https://us-central1-h3operations-prod.cloudfunctions.net/submitSmsOptin';

    var form = document.getElementById('form');
    var doneEl = document.getElementById('done');
    var errorEl = document.getElementById('error');
    var submitBtn = document.getElementById('submit');
    var consentEl = document.getElementById('consent');
    var phoneEl = document.getElementById('phone');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      errorEl.classList.add('hidden');

      if (!consentEl.checked) {
        showError('Please check the box to consent to text messages.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';

      var ref = new URLSearchParams(window.location.search).get('ref');

      fetch(FUNCTION_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          phone: phoneEl.value,
          consent: true,
          consentCopyVersion: CONSENT_COPY_VERSION,
          ref: ref || null
        })
      })
        .then(function (res) {
          if (!res.ok) { throw new Error('bad status'); }
          form.classList.add('hidden');
          doneEl.classList.remove('hidden');
        })
        .catch(function () {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Opt in';
          showError('Something went wrong — please try again in a moment.');
        });
    });
  </script>
</body>
</html>
